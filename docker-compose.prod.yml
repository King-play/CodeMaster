services:
  codemate:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/codemate.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
    volumes:
      - codemate-data:/app/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - codemate
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  codemate-data:

