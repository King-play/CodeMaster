name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Validate Alembic migrations
        run: DATABASE_URL=sqlite:///./data/ci_migration.db python -m alembic upgrade head
      - name: Run backend tests
        run: pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high
      - name: Lint frontend
        run: npm --prefix frontend run lint
      - name: Build frontend
        run: npm --prefix frontend run build

  root-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install root tooling
        run: npm ci
      - name: Audit root tooling
        run: npm audit --audit-level=high
