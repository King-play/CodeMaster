name: Bug report
description: Report a reproducible CodeMate bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include input code or a small example when possible.
      placeholder: |
        1. Start the app
        2. Submit this code
        3. Observe the result
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Node, browser, and whether demo mode is enabled.
    validations:
      required: false

